name: Build

on:
  push:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build macOS client
        working-directory: client
        run: |
          CGO_ENABLED=1 go build -o scrunch-client-mac .
          chmod +x scrunch-client-mac
      - name: Build macOS server
        working-directory: server
        run: |
          go build -o scrunch-server-mac .
          chmod +x scrunch-server-mac
      - uses: actions/upload-artifact@v4
        with:
          name: scrunch-mac
          path: |
            client/scrunch-client-mac
            server/scrunch-server-mac

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build Windows client
        working-directory: client
        run: |
          go build -ldflags "-H windowsgui" -o scrunch-client.exe .
      - name: Build Windows server
        working-directory: server
        run: |
          go build -o scrunch-server.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: scrunch-windows
          path: |
            client/scrunch-client.exe
            server/scrunch-server.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: |
            scrunch-mac/client/scrunch-client-mac
            scrunch-mac/server/scrunch-server-mac
            scrunch-windows/client/scrunch-client.exe
            scrunch-windows/server/scrunch-server.exe

