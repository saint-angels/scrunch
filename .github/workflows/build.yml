name: Build

on:
  push:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build macOS client
        working-directory: client
        run: |
          CGO_ENABLED=1 go build -o scrunch-client-mac .
      - name: Build macOS server
        working-directory: server
        run: |
          go build -o scrunch-server-mac .
      - uses: actions/upload-artifact@v4
        with:
          name: scrunch-mac
          path: |
            client/scrunch-client-mac
            server/scrunch-server-mac

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build Windows client
        working-directory: client
        run: |
          go build -o scrunch-client.exe .
      - name: Build Windows server
        working-directory: server
        run: |
          go build -o scrunch-server.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: scrunch-windows
          path: |
            client/scrunch-client.exe
            server/scrunch-server.exe

